services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: milan
      POSTGRES_USER: milan
      POSTGRES_PASSWORD: milan
    ports:
      - "35432:5432"
    volumes:
      - milan_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U milan"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  milan_postgres_data:
